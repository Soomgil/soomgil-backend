spring:
  application:
    name: soomgil-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:soomgil}
    username: ${DB_USERNAME:soomgil}
    password: ${DB_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          ssl:
            enable: ${MAIL_SMTP_SSL:false}
            # 로컬(Mailpit)에서는 self-signed/비TLS 허용. Gmail 등 실제 SMTP로 전환 시 자동으로 무시됨
            trust: ${MAIL_SMTP_SSL_TRUST:*}
            checkserveridentity: ${MAIL_SMTP_CHECK_SERVER_IDENTITY:false}
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
      file: compose.yaml

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

mybatis:
  mapper-locations: classpath*:/mappers/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

soomgil:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    verification-base-url: ${MAIL_VERIFICATION_BASE_URL:http://localhost:5173/auth/verify-email}
    reset-base-url: ${MAIL_RESET_BASE_URL:http://localhost:5173/auth/reset-password}
    from: ${MAIL_FROM:noreply@soomgil.com}
  security:
    jwt:
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLWxvY2FsLWRldi1zZWNyZXQtZm9yLWp3dC1oczI1Ni1vbmx5}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      issuer: ${JWT_ISSUER:soomgil}
    oauth:
      kakao:
        client-id: ${KAKAO_CLIENT_ID:}
        client-secret: ${KAKAO_CLIENT_SECRET:}
        redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/oauth/kakao/callback}
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/oauth/google/callback}
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET:soomgil-local}
      access-key: ${S3_ACCESS_KEY:soomgil}
      secret-key: ${S3_SECRET_KEY:change-me-change-me}
