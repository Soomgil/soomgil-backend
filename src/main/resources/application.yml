spring:
  application:
    name: soomgil-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:soomgil}
    username: ${DB_USERNAME:soomgil}
    password: ${DB_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
      file: compose.yaml

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

mybatis:
  mapper-locations: classpath*:/mappers/**/*.xml
  type-handlers-package: com.soomgil.global.persistence
  configuration:
    map-underscore-to-camel-case: true

soomgil:
  mapbox:
    base-url: ${MAPBOX_BASE_URL:https://api.mapbox.com}
    access-token: ${MAPBOX_ACCESS_TOKEN:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET:soomgil-local}
      access-key: ${S3_ACCESS_KEY:soomgil}
      secret-key: ${S3_SECRET_KEY:change-me-change-me}
      public-base-url: ${S3_PUBLIC_BASE_URL:}
  preference:
    statistics:
      alpha: ${PREFERENCE_STATISTICS_ALPHA:100}
    tag-selection:
      minimum-confidence: ${PREFERENCE_TAG_MIN_CONFIDENCE:0.55}
      maximum-confirmed-tags: ${PREFERENCE_TAG_MAX_CONFIRMED:10}
    recommendation:
      matched-member-lift-threshold: ${PREFERENCE_MATCHED_MEMBER_LIFT:0.15}
    synthetic-persona:
      required-count: ${PREFERENCE_SYNTHETIC_PERSONA_COUNT:50}
      maximum-noise-rate: ${PREFERENCE_SYNTHETIC_MAX_NOISE_RATE:0.05}
      hard-preference-strength: ${PREFERENCE_SYNTHETIC_HARD_STRENGTH:1.50}
      soft-preference-strength: ${PREFERENCE_SYNTHETIC_SOFT_STRENGTH:0.60}
      super-like-threshold: ${PREFERENCE_SYNTHETIC_SUPER_LIKE_THRESHOLD:1.20}
      like-threshold: ${PREFERENCE_SYNTHETIC_LIKE_THRESHOLD:0.35}
      nope-threshold: ${PREFERENCE_SYNTHETIC_NOPE_THRESHOLD:-0.35}
      minimum-core-tag-reaction-count: ${PREFERENCE_SYNTHETIC_MIN_CORE_TAG_REACTIONS:50}
    real-user:
      minimum-total-reaction-count: ${PREFERENCE_REAL_MIN_TOTAL_REACTIONS:10000}
      minimum-core-tag-reaction-count: ${PREFERENCE_REAL_MIN_CORE_TAG_REACTIONS:100}
