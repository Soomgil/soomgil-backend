spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: soomgil-backend
  ai:
    model:
      chat: ${AI_CHAT_MODEL:}
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash-lite}
            temperature: 0.3
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:soomgil}
    username: ${DB_USERNAME:soomgil}
    password: ${DB_PASSWORD:change-me}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
          ssl:
            enable: ${MAIL_SMTP_SSL:false}
            # 로컬(Mailpit)에서는 self-signed/비TLS 허용. Gmail 등 실제 SMTP로 전환 시 자동으로 무시됨
            trust: ${MAIL_SMTP_SSL_TRUST:*}
            checkserveridentity: ${MAIL_SMTP_CHECK_SERVER_IDENTITY:false}
  docker:
    compose:
      enabled: ${SPRING_DOCKER_COMPOSE_ENABLED:true}
      file: compose.yaml

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /v3/api-docs

mybatis:
  mapper-locations: classpath*:/mappers/**/*.xml
  type-handlers-package: com.soomgil.global.persistence
  configuration:
    map-underscore-to-camel-case: true

soomgil:
  kto:
    base-url: ${KTO_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
    api-key: ${KTO_API_KEY:}
  mapbox:
    base-url: ${MAPBOX_BASE_URL:https://api.mapbox.com}
    access-token: ${MAPBOX_ACCESS_TOKEN:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  mail:
    verification-base-url: ${MAIL_VERIFICATION_BASE_URL:http://localhost:5173/auth/verify-email}
    reset-base-url: ${MAIL_RESET_BASE_URL:http://localhost:5173/auth/reset-password}
    from: ${MAIL_FROM:noreply@soomgil.com}
  security:
    jwt:
      secret: ${JWT_SECRET:Y2hhbmdlLW1lLWxvY2FsLWRldi1zZWNyZXQtZm9yLWp3dC1oczI1Ni1vbmx5}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      issuer: ${JWT_ISSUER:soomgil}
    oauth:
      kakao:
        client-id: ${KAKAO_CLIENT_ID:}
        client-secret: ${KAKAO_CLIENT_SECRET:}
        redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/auth/oauth/kakao/callback}
      google:
        client-id: ${GOOGLE_CLIENT_ID:}
        client-secret: ${GOOGLE_CLIENT_SECRET:}
        redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:5173/auth/oauth/google/callback}
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      region: ${S3_REGION:ap-northeast-2}
      bucket: ${S3_BUCKET:soomgil-local}
      access-key: ${S3_ACCESS_KEY:soomgil}
      secret-key: ${S3_SECRET_KEY:change-me-change-me}
      public-base-url: ${S3_PUBLIC_BASE_URL:}
  preference:
    statistics:
      alpha: ${PREFERENCE_STATISTICS_ALPHA:100}
    tag-selection:
      minimum-confidence: ${PREFERENCE_TAG_MIN_CONFIDENCE:0.55}
      maximum-confirmed-tags: ${PREFERENCE_TAG_MAX_CONFIRMED:10}
    recommendation:
      matched-member-lift-threshold: ${PREFERENCE_MATCHED_MEMBER_LIFT:0.15}
    synthetic-persona:
      required-count: ${PREFERENCE_SYNTHETIC_PERSONA_COUNT:50}
      maximum-noise-rate: ${PREFERENCE_SYNTHETIC_MAX_NOISE_RATE:0.05}
      hard-preference-strength: ${PREFERENCE_SYNTHETIC_HARD_STRENGTH:1.50}
      soft-preference-strength: ${PREFERENCE_SYNTHETIC_SOFT_STRENGTH:0.60}
      super-like-threshold: ${PREFERENCE_SYNTHETIC_SUPER_LIKE_THRESHOLD:1.20}
      like-threshold: ${PREFERENCE_SYNTHETIC_LIKE_THRESHOLD:0.35}
      nope-threshold: ${PREFERENCE_SYNTHETIC_NOPE_THRESHOLD:-0.35}
      minimum-core-tag-reaction-count: ${PREFERENCE_SYNTHETIC_MIN_CORE_TAG_REACTIONS:50}
    real-user:
      minimum-total-reaction-count: ${PREFERENCE_REAL_MIN_TOTAL_REACTIONS:10000}
      minimum-core-tag-reaction-count: ${PREFERENCE_REAL_MIN_CORE_TAG_REACTIONS:100}
