services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: ${DB_NAME:-soomgil}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_USER: ${DB_USERNAME:-soomgil}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-soomgil} -d ${DB_NAME:-soomgil}']
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: 'redis:7-alpine'
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
  mailpit:
    image: 'axllent/mailpit:latest'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 'true'
      MP_SMTP_AUTH_ALLOW_INSECURE: 'true'
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAIL_WEB_PORT:-8025}:8025'
  minio:
    image: 'minio/minio:latest'
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-soomgil}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me-change-me}
    ports:
      - '${S3_PORT:-9000}:9000'
      - '${S3_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
